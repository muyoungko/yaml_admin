debug: true
login:
  jwt-secret: ${JWT_SECRET}
  password-encoding: sha512 # bcrypt, sha512, sha256
  id-password:
    entity: admin
    id-field: email 
    password-field: password
  master-email: master
  master-password: '5756'
api-host: 
  uri: http://localhost:6911/english-169a/dev
web-host: 
  uri: http://localhost:6900/english-169a/dev
database:
  mongodb: 
    uri: ${MONGODB_URL}
upload:
  s3:
    access_key_id: ${S3_ACCESS_KEY_ID}
    secret_access_key: ${S3_SECRET_ACCESS_KEY}
    region: ${S3_REGION}
    prefix: ${S3_PREFIX}
    bucket: ${S3_BUCKET}
    bucket_private: ${S3_BUCKET_PRIVATE}
    base_url: ${S3_BASE_URL}
entity:
  member:
    icon: "solar:user-hands-outline"
    label: "사용자"
    crud:
      search:
        - name: member_no
        - name: email
          exact: false
        - name: name
          exact: false
        - name: purchase.valid
      list: 
        - name: member_no
        - name: email
        - name: name
        - name: type
        - name: push.os
        - name: purchase.valid
        - name: purchase.reg_date
        - name: purchase.sync_date
      create: false
      edit: false
      show: true
      delete: false
    fields:
      - name: member_no
        label: "회원번호"
        type: string
        required: true
        key: true
        autogenerate: true
      - name: email
        label: "이메일"
        type: string
        required: true
      - name: name
        label: "이름"
        type: string
        required: true
      - name: type
        type: select
        label: "가입유형"
        select_values:
          - name: "google"
            label: "구글"
          - name: "apple"
            label: "애플"
        required: true
      - name: push.os
        type: string
        label: "OS"
      - name: purchase.valid
        label: "구독"
        type: boolean
      - name: purchase.reg_date
        label: "구독시작"
        type: date
      - name: purchase.sync_date
        label: "구독동기화"
        type: date
    api_generate:
      push:
        match_from: member_no
        entity: push
        match: member_no
        single: true
        fields: 
          - name: fcm
          - name: os
      purchase:
        match_from: member_no
        entity: purchase
        match: member_no
        single: true
        filter:
          - name: valid
            value: true
        fields: 
          - name: valid
          - name: reg_date
          - name: sync_date
  admin:
    icon: 'solar:shield-user-outline'
    label: '운영자'
    crud:
      search:
        - name: email
        - name: name
      list: true
      create: true
      edit: true
      show: true
      delete: true
    fields:
      - name: id
        label: "ID"
        type: integer
        required: true
        key: true
        autogenerate: true
      - name: email
        label: "이메일"
        type: string
        required: true
      - name: name
        label: "이름"
        type: string
        required: true
      - name: password
        label: "비밀번호"
        type: password
        required: true
  tag:
    icon: "solar:hashtag-linear"
    label: "태그"
    crud:
      list: true
      create: true
      edit: true
      delete: true
    fields:
      - name: _id
        type: objectId
        key: true
      - name : name
        type : string
  sentence:
    icon: "solar:dialog-2-linear"
    label: "구문"
    crud:
      list: true
      create: true
      edit: true
      delete: true
    fields:
      - name: _id
        type: objectId
        key: true
      - name: name
        label: '구문'
        type: string
      - name: translation
        label: '해석'
        type: string
      - name: mp3
        label: '음성'
        type: file
      - name: tag_list
        label: "태그목록"
        type: array
        fields:
          - name: name
            label: "태그명"
            type: string
          - name: seq
            label: "우선순위"
            default: 1
            type: integer